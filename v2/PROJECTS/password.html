<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Generate a memorable password using English words." />
  <title>Password Generator — Intracoastal Dispatch</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --black: #111111;
      --dark-grey: #333333;
      --mid-grey: #666666;
      --light-grey: #aaaaaa;
      --rule: #cccccc;
      --bg: #ffffff;
      --section-bg: #fafafa;
    }

    body {
      font-family: Georgia, 'Times New Roman', serif;
      background: var(--bg);
      color: var(--dark-grey);
      font-size: 16px;
      line-height: 1.6;
    }

    /* ── Header ── */
    header {
      border-bottom: 3px double var(--black);
      padding: 24px 48px 0;
    }

    .masthead {
      text-align: center;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--rule);
    }

    .masthead h1 {
      font-size: 3rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--black);
      font-weight: 700;
      line-height: 1;
    }

    .masthead a {
      text-decoration: none;
      color: inherit;
    }

    nav {
      display: flex;
      justify-content: center;
      gap: 40px;
      padding: 12px 0;
    }

    nav a {
      text-decoration: none;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--dark-grey);
      transition: color 0.15s;
    }

    nav a:hover { color: var(--black); }

    /* ── Page ── */
    main {
      max-width: 700px;
      margin: 0 auto;
      padding: 56px 24px 100px;
    }

    .page-label {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--mid-grey);
      margin-bottom: 6px;
    }

    .page-heading {
      font-size: 2.2rem;
      font-weight: 700;
      color: var(--black);
      border-bottom: 3px solid var(--black);
      padding-bottom: 14px;
      margin-bottom: 10px;
    }

    .page-desc {
      font-size: 0.92rem;
      color: var(--mid-grey);
      font-style: italic;
      margin-bottom: 36px;
    }

    /* ── Password list ── */
    .password-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0;
      margin-bottom: 28px;
      border: 1px solid var(--rule);
    }

    .password-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      cursor: pointer;
      gap: 16px;
      background: var(--bg);
      border-bottom: 1px solid var(--rule);
      transition: background 0.12s;
    }

    .password-item:last-child {
      border-bottom: none;
    }

    .password-item:hover {
      background: var(--section-bg);
    }

    .password-item:active {
      background: #f0f0f0;
    }

    .password-text {
      font-family: 'Courier New', Courier, monospace;
      font-size: 1.1rem;
      letter-spacing: 0.03em;
      word-break: break-all;
    }

    /* Word-part colors adapted for light background */
    .password-text .adj  { color: #1a4db5; }   /* blue */
    .password-text .sym  { color: #2d8a4e; }   /* green */
    .password-text .noun { color: #b52020; }   /* red */
    .password-text .num  { color: #8a6a00; }   /* amber */

    .copy-hint {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      font-size: 0.72rem;
      color: var(--light-grey);
      white-space: nowrap;
      flex-shrink: 0;
      letter-spacing: 0.04em;
    }

    .password-item.copied {
      background: #f0faf4;
    }

    .password-item.copied .copy-hint {
      color: #2d8a4e;
    }

    /* ── Button ── */
    .btn {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border: 2px solid var(--rule);
      background: transparent;
      color: var(--mid-grey);
      padding: 10px 24px;
      cursor: pointer;
      transition: background 0.12s, color 0.12s, border-color 0.12s;
    }

    .btn:hover {
      border-color: var(--dark-grey);
      background: var(--dark-grey);
      color: var(--bg);
    }

    /* ── Format note ── */
    .format-note {
      margin-top: 20px;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      font-size: 0.78rem;
      color: var(--light-grey);
      letter-spacing: 0.02em;
    }

    .format-note .adj  { color: #1a4db5; }
    .format-note .sym  { color: #2d8a4e; }
    .format-note .noun { color: #b52020; }
    .format-note .num  { color: #8a6a00; }

    /* ── Footer ── */
    footer {
      border-top: 1px solid var(--rule);
      margin-top: 60px;
      padding: 20px 24px;
      text-align: center;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      font-size: 0.75rem;
      color: var(--light-grey);
      letter-spacing: 0.05em;
    }

    @media (max-width: 600px) {
      header { padding: 20px 20px 0; }
      .masthead h1 { font-size: 2rem; }
      .password-text { font-size: 0.95rem; }
    }
  </style>
</head>
<body>

  <header>
    <div class="masthead">
      <a href="../home.html"><h1>Intracoastal Dispatch</h1></a>
    </div>
    <nav>
      <a href="../home.html">Home</a>
      <a href="#">About</a>
    </nav>
  </header>

  <main>
    <p class="page-label">Projects</p>
    <h2 class="page-heading">Password Generator</h2>
    <p class="page-desc">Click any password to copy it to your clipboard.</p>

    <ul class="password-list" id="passwordList" role="list"></ul>

    <button class="btn" id="generateBtn">Generate New Options</button>

    <p class="format-note">
      Format: <span class="adj">adjective</span><span class="sym">!</span><span class="noun">NOUN</span><span class="sym">!</span><span class="num">42</span>
    </p>
  </main>

  <footer>
    2026 Intracoastal Dispatch
  </footer>

  <script>
    const ADJECTIVES = [
      // A
      "absent","acute","agile","alert","antsy","ardent","arid",
      "ashen","ashy","astute","avid","awake",
      // B
      "balmy","bare","basic","beefy","bland","bleak","blunt","bold","bored",
      "brave","brisk","brown","bulky","busy",
      // C
      "calm","candid","chilly","chunky","civic","clean","clear","close","cloudy",
      "coarse","cold","cool","cozy","crisp","crude","curly","curvy",
      // D
      "damp","dark","dazed","dead","deep","dense","dizzy",
      "dodgy","drab","dreary","dull","dusty","dusty",
      // E
      "eager","early","earthy","easy","edgy","elder","empty","exact","exotic",
      // F
      "faint","fair","fancy","fast","feral","fiery","firm","flat","fleet","flimsy",
      "floral","fluid","foggy","free","fresh","frosty","frugal","funky",
      // G
      "gaunt","gaudy","gentle","giant","giddy","gloomy","glossy","golden","grand","grim",
      "grimy","gusty",
      // H
      "happy","harsh","hasty","hazy","heavy","hefty","hollow","humid","hushed","husky",
      // I
      "idle","inner","irate","itchy",
      // J
      "jagged","jazzy","jolly","jumpy",
      // K
      "keen","kooky",
      // L
      "lanky","large","lazy","lean","light","lofty","lone","loose","loud","lush","lumpy",
      // M
      "meek","mellow","merry","mild","milky","misty","moody","muddy","murky","musty",
      // N
      "narrow","neat","nimble","noble","noisy","numb",
      // O
      "open","outer","oval",
      // P
      "pale","pasty","placid","plain","plucky","plump","proud",
      // Q
      "quick","quiet",
      // R
      "rainy","rapid","rare","rigid","rocky","rough","rowdy","rugged","rusty",
      // S
      "safe","salty","sandy","serene","shady","sharp","sheer","silky","sleek",
      "slim","slow","smoky","snappy","snug","soft","soggy","solid","spare","stark",
      "stiff","stoic","stout","sturdy","sunny","swift",
      // T
      "tall","tangy","tense","terse","thin","tidy","timid","toxic","trim",
      // U
      "ultra","unruly","urban",
      // V
      "vague","vast","vivid",
      // W
      "warm","wavy","weary","windy","witty","wooly",
      // Y
      "young",
      // Z
      "zany","zippy"
    ];

    const NOUNS = [
      // A
      "ABBEY","ACORN","ADDER","AGAVE","AISLE","ALGAE","ALLEY","ALLOY","ALTAR","AMBER",
      "AMBLE","ANGEL","ANKLE","ANVIL","APPLE","APRON","ARBOR","ARENA","ARMOR","ARROW",
      "ATLAS","ATTIC","AUGER","AVAIL","AXIOM",
      // B
      "BADGE","BAKER","BARGE","BARON","BASIN","BATCH","BATON","BAYOU","BEACH","BEECH",
      "BENCH","BIRCH","BLADE","BLAZE","BLIMP","BLOOM","BLUFF","BOARD","BOGEY","BONGO",
      "BONUS","BOOTH","BRACE","BRAID","BRAND","BROOK","BROOM","BOXER","BRINE","BUGLE",
      "BULGE","BULLY","BUNCH","BUOY",
      // C
      "CACHE","CAIRN","CAMEL","CANOE","CANON","CAPER","CARGO","CAROL","CEDAR","CHALK",
      "CHAMP","CHARD","CHARM","CHART","CHASE","CHESS","CHIMP","CHORD","CHURN","CIVIC",
      "CLAMP","CLASH","CLASP","CLIFF","CLOCK","CLONE","CLOUD","CLOVE","COBRA","COMET",
      "CORAL","CRANE","CRATE","CREST","CRIMP","CROAK","CROWN","CRYPT","CUBIC","CUPID",
      // D
      "DELTA","DEPOT","DERBY","DINGO","DIRGE","DISCO","DODGE","DOWEL","DRAFT","DRAKE",
      "DRAWL","DRIFT","DRONE","DUNCE","DWARF",
      // E
      "EAGLE","EASEL","EBONY","EDGER","ELDER","ELEGY","ELITE","EMBER","ENVOY","EPOCH",
      "EQUIP","ERGOT","EVICT",
      // F
      "FABLE","FACET","FAIRY","FAUNA","FEAST","FENCE","FERRY","FETCH","FIORD","FJORD",
      "FLARE","FLASK","FLESH","FLINT","FLORA","FLUKE","FLUME","FLUTE","FOGGY","FORGE",
      "FORTE","FRAUD","FROND","FROST","FROZE","FUNGI",
      // G
      "GECKO","GEYSER","GHOST","GLADE","GLARE","GLEAM","GLINT","GLOBE","GLOOM","GLORY",
      "GLOSS","GLOVE","GNOME","GOOSE","GOURD","GRAIL","GRAIN","GRAFT","GRAPE","GRAVEL",
      "GROVE","GRUEL","GUILE","GUISE","GUSTO",
      // H
      "HAVEN","HELIX","HERBS","HERON","HIPPO","HINGE","HOARD","HOMER","HORDE","HUNTS",
      // I
      "ICHOR","IGLOO","IMAGE","INDEX","INFER","INPUT","IVORY",
      // J
      "JASPER","JEWEL","JOKER","JOUST","JUDGE","JUMBO",
      // K
      "KAYAK","KELP","KIOSK","KNAVE","KNOLL",
      // L
      "LANCE","LAPEL","LARCH","LASER","LATCH","LATHE","LEDGE","LEMON","LETHE","LEVER",
      "LIGHT","LLAMA","LODGE","LOFTY","LUMEN","LUSTRE","LYRIC",
      // M
      "MAPLE","MANOR","MARCH","MARSH","MAXIM","MEDAL","MELON","MERCY","MERIT","MIMIC",
      "MIRTH","MITER","MOOSE","MORPH","MOSSY","MOTIF","MOULD","MOURN","MOXIE","MULCH",
      "MURAL","MURK",
      // N
      "NERVE","NEXUS","NIGHT","NOTCH","NYMPH",
      // O
      "OAKEN","OCEAN","OLIVE","ONION","ONSET","OPTIC","ORBIT","OTTER","OUTPOST","OXIDE",
      // P
      "PARCH","PATCH","PEARL","PEDAL","PIANO","PILOT","PIXEL","PLAID","PLANK","PLAZA",
      "PLUME","POKER","PRISM","PROBE","PROWL","PSALM","PULSE",
      // Q
      "QUAIL","QUARK","QUILL","QUOTA",
      // R
      "RAVEN","REALM","RELAY","RESIN","RIDER","RIVET","ROBIN","ROUGE","ROVER","ROWEL",
      // S
      "SABRE","SADDLE","SALVE","SCALP","SCONE","SCOUT","SCYTHE","SERUM","SHAFT","SHALE",
      "SHAWL","SHEEN","SHOAL","SIEGE","SIGMA","SINEW","SKALD","SKIFF","SKULL","SLATE",
      "SLEET","SLOTH","SMELT","SMOKE","SNARE","SOLAR","SPADE","SPARK","SPELL","SPIRE",
      "SPORE","SPOUT","SPRIG","SPUNK","SQUAD","STAVE","STEEL","STEEP","STERN","STONE",
      "STORK","STORM","STOUT","STRAP","STRAW","STRAY","SUGAR","SUITE","SWAMP","SWIRL",
      // T
      "TABBY","TALON","TAPIR","TAUNT","TEMPO","THANE","THATCH","THORN","TIGER","TITHE",
      "TORCH","TOTEM","TRAMP","TROUT","TROVE","TRUCE","TULIP","TUNDRA","TUNER","TWIGG",
      // U
      "ULTRA","UMBRA","UMBER","UNCLE","UNISON",
      // V
      "VALOR","VAPOR","VAULT","VEINS","VENOM","VERGE","VIOLA","VIPER","VISTA","VOLLEY",
      // W
      "WALTZ","WARDEN","WEDGE","WHELK","WHIRL","WIGHT","WINGE","WITCH","WRAITH","WRATH",
      // X
      "XENON","XYLEM",
      // Y
      "YACHT","YEOMAN","YIELD",
      // Z
      "ZEAL","ZEBRA","ZENITH","ZIPPER","ZODIAC"
    ];

    const SPECIAL_CHARS = ["!","@","#","$","%","^","&","*","-","_","+","=","?"];

    function rand(max) {
      return Math.floor(Math.random() * max);
    }

    function randTwoDigit() {
      return String(10 + rand(90));
    }

    function generatePassword() {
      const adj  = ADJECTIVES[rand(ADJECTIVES.length)];
      const sym  = SPECIAL_CHARS[rand(SPECIAL_CHARS.length)];
      const noun = NOUNS[rand(NOUNS.length)];
      const num  = randTwoDigit();
      return { adj, sym, noun, num, full: adj + sym + noun + sym + num };
    }

    function buildItem(pw) {
      const li = document.createElement("li");
      li.className = "password-item";
      li.setAttribute("role", "button");
      li.setAttribute("tabindex", "0");
      li.setAttribute("aria-label", `Password: ${pw.full}. Click to copy.`);

      const span = document.createElement("span");
      span.className = "password-text";
      span.innerHTML =
        `<span class="adj">${pw.adj}</span>` +
        `<span class="sym">${pw.sym}</span>` +
        `<span class="noun">${pw.noun}</span>` +
        `<span class="sym">${pw.sym}</span>` +
        `<span class="num">${pw.num}</span>`;

      const hint = document.createElement("span");
      hint.className = "copy-hint";
      hint.textContent = "click to copy";

      li.appendChild(span);
      li.appendChild(hint);

      function doCopy() {
        navigator.clipboard.writeText(pw.full).then(() => {
          li.classList.add("copied");
          hint.textContent = "copied!";
          setTimeout(() => {
            li.classList.remove("copied");
            hint.textContent = "click to copy";
          }, 2000);
        });
      }

      li.addEventListener("click", doCopy);
      li.addEventListener("keydown", (e) => {
        if (e.key === "Enter" || e.key === " ") {
          e.preventDefault();
          doCopy();
        }
      });

      return li;
    }

    function generateAll() {
      const list = document.getElementById("passwordList");
      list.innerHTML = "";
      for (let i = 0; i < 3; i++) {
        list.appendChild(buildItem(generatePassword()));
      }
    }

    document.getElementById("generateBtn").addEventListener("click", generateAll);
    generateAll();
  </script>

</body>
</html>
